<title>Client-picker</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

        background:
            radial-gradient(
                circle at center,
                #001533 0%,
                #000814 25%,
                #000000 70%
            );
    }

    .button-container {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        justify-content: center;
        margin-bottom: 60px;
    }

    .menu-button {
        display: flex;
        align-items: center;
        gap: 12px;

        min-width: 240px;
        padding: 15px 25px;

        text-decoration: none;
        cursor: pointer;

        background: #00aa00;
        border: 2px solid #00ff00;
        border-radius: 12px;

        box-shadow:
            0 0 10px #00ff00,
            0 0 20px #00ff00,
            0 0 40px #00aa00;
    }

    .menu-button:hover {
        transform: scale(1.05);
    }

    .button-image {
        width: 40px;
        height: 40px;
        object-fit: contain;
        flex-shrink: 0;
    }

    .button-text {
        color: black;
        font-weight: bold;
        font-size: 20px;

        text-shadow:
            0 0 5px #ffffff,
            0 0 10px #ffffff,
            0 0 20px #ffffff;
    }

    .bottom-link {
        color: #00ff00;
        text-decoration: none;
        font-size: 18px;
        cursor: pointer;

        text-shadow:
            0 0 5px #00ff00,
            0 0 10px #00ff00;
    }

    .bottom-link:hover {
        text-decoration: underline;
    }
</style>
