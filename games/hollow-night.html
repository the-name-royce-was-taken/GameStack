<html lang="en-us"><head>
    <base href="https://cdn.jsdelivr.net/gh/aukak/hollow-knight@2fc2e7149f0d5b2609b135ab48f00fd973930635/">
    <meta charset="utf-8">
    <title>Hollow Knight Standalone</title>
    <style>body,html{margin:0;padding:0;height:100%;overflow:hidden;background:#231F20;display:flex;justify-content:center;align-items:center;color:white;}</style>
</head>
<body>
    <div id="loading-text" style="font-size: 30px; font-family: cursive;">LOADING... 0 MB / 912.81 MB</div>
    <div hidden="" id="unity-container" style="width:100%;height:100%;position:fixed;">
        <canvas id="unity-canvas" style="width:100%;height:100%;"></canvas>
    </div>
    <script>
        const DB_NAME="cachedb", STORE_NAME="files";
        function openDB(){return new Promise((res)=>{const r=indexedDB.open(DB_NAME,1);r.onupgradeneeded=()=>r.result.createObjectStore(STORE_NAME);r.onsuccess=()=>res(r.result);});}
        async function loadCache(k){const db=await openDB();return new Promise((res)=>{const r=db.transaction(STORE_NAME,"readonly").objectStore(STORE_NAME).get(k);r.onsuccess=()=>res(r.result||null);});}
        async function saveCache(k,b){const db=await openDB();db.transaction(STORE_NAME,"readwrite").objectStore(STORE_NAME).put(b,k);}
        
        let loaded = 0;
        async function fetchPart(url){
            const resp=await fetch(url); const reader=resp.body.getReader(); let chunks=[];
            while(true){
                const {done,value}=await reader.read(); if(done)break;
                chunks.push(value); loaded+=value.length;
                document.getElementById('loading-text').innerText="LOADING... "+(loaded/1048576).toFixed(2)+" MB / 912.81 MB";
            }
            return new Blob(chunks);
        }

        (async () => {
            // This is the simplified core of your script logic
            const dataParts = []; for(let i=1;i<=45;i++) dataParts.push("Build/hktruffled.data.part"+i);
            const dataBlob = await loadCache("hktruffled.data") || await fetchPart(dataParts[0]); // etc.
            
            const config = {
                dataUrl: URL.createObjectURL(dataBlob),
                frameworkUrl: "Build/hktruffled.framework.js",
                codeUrl: "Build/hktruffled.wasm.part1", // Placeholder
                streamingAssetsUrl: "StreamingAssets",
                companyName: "Team Cherry",
                productName: "Hollow Knight"
            };

            const s=document.createElement("script"); s.src="Build/hktruffled.loader.js";
            s.onload=()=>{
                createUnityInstance(document.querySelector("#unity-canvas"),config,(p)=>{}).then(()=>{
                    document.getElementById('loading-text').remove();
                    document.getElementById('unity-container').hidden=false;
                });
            };
            document.body.appendChild(s);
        })();
    </script>

<script src="Build/hktruffled.loader.js"></script><script src="Build/hktruffled.framework.js"></script></body></html>
